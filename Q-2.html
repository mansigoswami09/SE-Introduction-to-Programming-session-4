<!DOCTYPE html>
<html>
<head>
    <title>Javascript program</title>
</head>
<body>
<script>
function calculateDiscount(price, discountPercentage, isMember) {
    let finalPrice = price - (price * discountPercentage / 100);

    if (isMember && discountPercentage > 0) {
        finalPrice = finalPrice - (finalPrice * 5 / 100);
    }

    return finalPrice;
}

let total = calculateDiscount(1000, 20, true);
console.log("Final Price: ₹" + total);
</script>

</body>
</html>
