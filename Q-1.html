<!DOCTYPE html>

    <title>Javascript program</title>
</head>
<body>
<script>
    function calculateTotal(itemPrice, quantity) {
        return itemPrice * quantity;
    }

    let itemPrice = 100;
    let quantity = 3;

    let total = calculateTotal(itemPrice, quantity);

    console.log("Total Bill Amount: " + total);
</script>

</body>
